spring:
  application:
    name: resumeiq

  datasource:
    url: jdbc:postgresql://localhost:5432/resumeiq
    username: postgres
    password: Vansh@sql16
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 6MB

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=86400s

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.resumeiq.controller

jwt:
  secret: cmVzdW1laXEtand0LXNlY3JldC1rZXktMjU2LWJpdC1mb3ItZGV2ZWxvcG1lbnQ=
  access-token-expiry-ms: 900000
  refresh-token-expiry-days: 7

file:
  storage:
    upload-dir: ./uploads

ai:
  provider: groq
  groq:
    api-key: ${GROQ_API_KEY:}
    model: llama-3.3-70b-versatile
    base-url: https://api.groq.com/openai/v1
    temperature: 0.1
    max-tokens: 2000

resilience4j:
  ratelimiter:
    instances:
      groq-api:
        limit-for-period: 28          # just under Groq's 30 RPM free tier limit
        limit-refresh-period: 60s
        timeout-duration: 5s          # wait max 5s for a permit, then fail fast

logging:
  level:
    com.resumeiq: INFO
    org.flywaydb: INFO
    io.github.resilience4j: WARN